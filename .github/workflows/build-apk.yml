name: Build AlgoBotPro APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create assets
        run: |
          mkdir -p assets
          python3 -c "
          import struct, zlib
          def png(w, h, r, g, b):
            def ck(t, d):
              c = zlib.crc32(t + d) & 0xffffffff
              return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
            raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
            return (b'\x89PNG\r\n\x1a\n'
                    + ck(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
                    + ck(b'IDAT', zlib.compress(raw))
                    + ck(b'IEND', b''))
          open('assets/icon.png', 'wb').write(png(512, 512, 124, 58, 237))
          open('assets/presplash.png', 'wb').write(png(512, 512, 15, 23, 42))
          print('Assets OK!')
          "

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlgoBotPro-APK
          path: bin/*.apk
          retention-days: 30
