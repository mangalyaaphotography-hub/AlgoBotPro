name: Build AlgoBotPro APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create assets
        run: |
          mkdir -p assets
          python3 -c "
          import struct, zlib
          def png(w, h, r, g, b):
            def ck(t, d):
              c = zlib.crc32(t + d) & 0xffffffff
              return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
            raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
            return (b'\x89PNG\r\n\x1a\n'
                    + ck(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
                    + ck(b'IDAT', zlib.compress(raw))
                    + ck(b'IEND', b''))
          open('assets/icon.png', 'wb').write(png(512, 512, 124, 58, 237))
          open('assets/presplash.png', 'wb').write(png(512, 512, 15, 23, 42))
          print('Assets OK!')
          "

      - name: Debug - Find SDK location
        run: |
          echo "=== ENV VARS ==="
          env | grep -i android || echo "No ANDROID vars"
          echo "=== WHICH SDKMANAGER ==="
          which sdkmanager || echo "not in PATH"
          echo "=== FIND SDKMANAGER ==="
          find / -name "sdkmanager" -type f 2>/dev/null | head -5
          echo "=== FIND AIDL ==="
          find / -name "aidl" -type f 2>/dev/null | head -5
          echo "=== FIND BUILD-TOOLS ==="
          find / -name "build-tools" -type d 2>/dev/null | head -5

      - name: Install aidl and accept licenses
        run: |
          # Find sdkmanager
          SDK_MGR=$(which sdkmanager 2>/dev/null || find / -name "sdkmanager" -type f 2>/dev/null | head -1)
          echo "sdkmanager: $SDK_MGR"

          # Get SDK root from sdkmanager path
          # sdkmanager is usually at $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          export ANDROID_HOME=$(dirname $(dirname $(dirname $(dirname $SDK_MGR))))
          echo "ANDROID_HOME=$ANDROID_HOME"

          # Accept licenses
          yes | $SDK_MGR --licenses || true

          # Install build-tools 33.0.2 (has aidl)
          yes | $SDK_MGR "build-tools;33.0.2" "platforms;android-33" "platform-tools" || true
          yes | $SDK_MGR --licenses || true

          # Find and link aidl
          AIDL=$(find $ANDROID_HOME -name "aidl" -type f 2>/dev/null | head -1)
          echo "aidl found at: $AIDL"
          if [ -n "$AIDL" ]; then
            cp "$AIDL" /usr/local/bin/aidl
            chmod +x /usr/local/bin/aidl
            echo "aidl installed to /usr/local/bin/"
          fi

          # Save ANDROID_HOME for next step
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Build APK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          # Add build-tools to PATH
          BT=$(find $ANDROID_HOME -name "aidl" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          echo "Build tools: $BT"
          export PATH="$BT:$PATH"

          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlgoBotPro-APK
          path: bin/*.apk
          retention-days: 30
