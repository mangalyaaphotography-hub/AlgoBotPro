- name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_NDK_HOME=$HOME/android-sdk/ndk/25.2.9519653
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/33.0.0:$PATH

          # Tell buildozer where SDK/NDK are
          sed -i "s|#android.sdk_path =|android.sdk_path = $HOME/android-sdk|" buildozer.spec
          sed -i "s|#android.ndk_path =|android.ndk_path = $ANDROID_NDK_HOME|" buildozer.spec

          # Add paths if not present
          grep -q "android.sdk_path" buildozer.spec || echo "android.sdk_path = $HOME/android-sdk" >> buildozer.spec
          grep -q "android.ndk_path" buildozer.spec || echo "android.ndk_path = $ANDROID_NDK_HOME" >> buildozer.spec

          buildozer android debug 2>&1
        env:
          ANDROID_HOME: ${{ env.HOME }}/android-sdk
