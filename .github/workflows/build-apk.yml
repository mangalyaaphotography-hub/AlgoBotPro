name: Build AlgoBotPro APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create assets
        run: |
          mkdir -p assets
          python3 -c "
          import struct, zlib
          def png(w, h, r, g, b):
            def ck(t, d):
              c = zlib.crc32(t + d) & 0xffffffff
              return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
            raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
            return (b'\x89PNG\r\n\x1a\n'
                    + ck(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
                    + ck(b'IDAT', zlib.compress(raw))
                    + ck(b'IEND', b''))
          open('assets/icon.png', 'wb').write(png(512, 512, 124, 58, 237))
          open('assets/presplash.png', 'wb').write(png(512, 512, 15, 23, 42))
          print('Assets OK!')
          "

      - name: Install build-tools and aidl
        run: |
          # Accept all licenses first
          yes | sdkmanager --licenses || true

          # Install specific build-tools with aidl
          yes | sdkmanager "build-tools;33.0.2" || true
          yes | sdkmanager "platforms;android-33" || true
          yes | sdkmanager "platform-tools" || true

          # Accept licenses again after install
          yes | sdkmanager --licenses || true

          # Find and symlink aidl to PATH
          AIDL_PATH=$(find /opt -name "aidl" 2>/dev/null | head -1)
          if [ -z "$AIDL_PATH" ]; then
            AIDL_PATH=$(find /root -name "aidl" 2>/dev/null | head -1)
          fi
          if [ -z "$AIDL_PATH" ]; then
            AIDL_PATH=$(find /home -name "aidl" 2>/dev/null | head -1)
          fi
          echo "Found aidl at: $AIDL_PATH"
          if [ -n "$AIDL_PATH" ]; then
            ln -sf "$AIDL_PATH" /usr/local/bin/aidl
            echo "aidl linked to /usr/local/bin/aidl"
          fi

          # Verify aidl
          which aidl && echo "aidl OK" || echo "aidl not in PATH"

          # Show build-tools contents
          find / -name "build-tools" -type d 2>/dev/null | head -5

      - name: Build APK
        run: |
          # Set Android SDK paths
          export ANDROID_SDK_ROOT=$(find /opt /root /home -name "android-sdk" -type d 2>/dev/null | head -1)
          if [ -z "$ANDROID_SDK_ROOT" ]; then
            export ANDROID_SDK_ROOT=$(dirname $(dirname $(which sdkmanager)) 2>/dev/null) || true
          fi
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

          # Add build-tools to PATH
          BT_PATH=$(find "$ANDROID_SDK_ROOT" -name "aidl" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          echo "Build tools path: $BT_PATH"
          export PATH="$BT_PATH:$PATH"

          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlgoBotPro-APK
          path: bin/*.apk
          retention-days: 30
